<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AES/DHI Vietnam – Realtime TV Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#040d1a;--panel:#071428;--panel2:#0a1c35;--border:#1a3a5c;--accent:#00d4ff;--accent2:#ff6b35;--accent3:#39ff14;--warning:#ffcc00;--danger:#ff4757;--muted:#4a6fa5;--text:#e8f4fd;--text2:#8baecf}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.hdr{position:fixed;top:0;left:0;right:0;height:60px;background:linear-gradient(90deg,#040d1a 0%,#071a30 50%,#040d1a 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:100;box-shadow:0 2px 24px rgba(0,212,255,.12)}
.hdr-logo{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;color:var(--accent);text-shadow:0 0 18px rgba(0,212,255,.5)}
.hdr-logo b{color:var(--accent2)}.hdr-mid{text-align:center}
.hdr-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text)}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:16px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;letter-spacing:1px;color:var(--muted)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent3)}
.live-dot.stale{background:var(--warning);animation:blink 1s infinite}
.live-dot.err{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clock{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--accent);letter-spacing:2px;text-shadow:0 0 14px rgba(0,212,255,.4)}
.date-txt{font-size:10px;color:var(--text2);letter-spacing:.5px;text-align:right}
.slides{position:fixed;top:60px;left:0;right:0;bottom:44px;overflow:hidden}
.slide{position:absolute;inset:0;padding:18px 26px 12px;opacity:0;transform:translateX(50px);transition:all .55s cubic-bezier(.22,1,.36,1);pointer-events:none}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all}
.slide.leaving{opacity:0;transform:translateX(-50px)}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.sh-icon{font-size:20px}.sh-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;text-shadow:0 0 14px rgba(0,212,255,.3)}
.sh-badge{margin-left:auto;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--accent);background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);padding:2px 10px;border-radius:12px;letter-spacing:1px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;overflow-y:auto;max-height:calc(100vh - 160px);padding-bottom:4px}
.proj-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;background:var(--accent)}
.proj-card.in-progress::before{background:var(--accent3)}.proj-card.delayed::before{background:var(--danger)}
.proj-card.on-hold::before{background:var(--warning)}.proj-card.planning::before{background:var(--muted)}
.proj-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.proj-code{font-size:11px;color:var(--muted);letter-spacing:.5px;font-family:'Rajdhani',sans-serif}
.proj-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.s-chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.s-inprogress{background:rgba(57,255,20,.12);color:var(--accent3);border:1px solid rgba(57,255,20,.25)}
.s-planning{background:rgba(74,111,165,.15);color:var(--muted);border:1px solid var(--border)}
.s-delayed{background:rgba(255,71,87,.12);color:var(--danger);border:1px solid rgba(255,71,87,.25)}
.s-onhold{background:rgba(255,204,0,.12);color:var(--warning);border:1px solid rgba(255,204,0,.25)}
.proj-customer{font-size:11px;color:var(--text2);margin-bottom:8px}
.proj-ms{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.2);border-radius:5px;padding:4px 9px;font-size:12px;color:var(--accent);display:inline-block;margin-bottom:8px}
.ms-pips{display:flex;gap:3px;margin-top:6px}.pip{flex:1;height:4px;border-radius:2px;background:var(--border)}
.pip.done{background:var(--accent3)}.pip.active{background:var(--accent);animation:pip-pulse 1.5s infinite}.pip.late{background:var(--danger)}
@keyframes pip-pulse{0%,100%{opacity:1}50%{opacity:.35}}
.wk-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;height:calc(100vh - 160px)}
.wk-panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
.wk-head{padding:10px 16px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(0,212,255,.08),transparent);display:flex;justify-content:space-between;align-items:center}
.wk-panel.next .wk-head{background:linear-gradient(90deg,rgba(255,107,53,.08),transparent)}
.wk-label{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.wk-panel.next .wk-label{color:var(--accent2)}.wk-range{font-size:11px;color:var(--text2)}
.ms-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
.ms-item{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:9px 12px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;position:relative;overflow:hidden}
.ms-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--accent)}
.ms-item.ending::before{background:var(--accent2)}.ms-item.overdue::before{background:var(--danger)}
.mi-proj{font-size:10px;color:var(--muted);margin-bottom:1px}.mi-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.mi-who{font-size:11px;color:var(--accent)}.mi-dd{text-align:right}
.mi-dd-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.mi-dd-val{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:var(--text2)}
.mi-dd-val.ending{color:var(--accent2)}.mi-dd-val.overdue{color:var(--danger)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px}
.empty span{font-size:32px;opacity:.35}
.sched-wrap{height:calc(100vh - 160px);overflow-y:auto}
.wk-sec-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin:6px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.wk-sec-title.next{color:var(--accent2)}.wk-sec-title small{font-family:'Exo 2';font-size:11px;font-weight:400;color:var(--muted)}
.tbl-wrap{overflow-x:auto;margin-bottom:18px}.sched-tbl{width:100%;border-collapse:collapse;min-width:580px}
.sched-tbl th{background:var(--panel2);border:1px solid var(--border);padding:7px 10px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;color:var(--text2);text-align:center}
.sched-tbl th.today-h{color:var(--accent);background:rgba(0,212,255,.05);border-color:rgba(0,212,255,.3)}.sched-tbl th.name-h{text-align:left;min-width:130px}
.sched-tbl td{border:1px solid var(--border);padding:5px 7px;vertical-align:top}.sched-tbl tr:hover td{background:rgba(255,255,255,.015)}
.mem-cell{background:var(--panel2);padding:5px 10px;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
.mem-role{font-size:9px;color:var(--muted);font-weight:400;margin-top:1px}.td-today{background:rgba(0,212,255,.03);border-color:rgba(0,212,255,.2)!important}
.chip{display:block;border-radius:3px;padding:2px 5px;font-size:10px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.18);color:var(--accent)}
.chip.sv{background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.18);color:var(--accent2)}.chip.asm{background:rgba(57,255,20,.06);border-color:rgba(57,255,20,.18);color:var(--accent3)}
.chip.td{box-shadow:0 0 6px rgba(0,212,255,.25)}.free{color:var(--border);font-size:11px;text-align:center;line-height:28px}
.nav{position:fixed;bottom:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:center;gap:40px;background:rgba(4,13,26,.85);border-top:1px solid var(--border);z-index:100}
.nav-btn{display:flex;align-items:center;gap:7px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.5px;color:var(--muted);cursor:pointer;text-transform:uppercase;transition:color .2s;border:none;background:none;padding:4px 14px;border-radius:4px}
.nav-btn:hover{color:var(--text)}.nav-btn.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.prog-bar{position:fixed;bottom:44px;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 0 8px var(--accent);z-index:101}
.overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999}
.ov-logo{font-family:'Rajdhani',sans-serif;font-size:34px;font-weight:700;color:var(--accent);letter-spacing:4px;text-shadow:0 0 20px rgba(0,212,255,.5);animation:pulse .7s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.4}}.ov-bar-wrap{width:280px;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.ov-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:bar-sweep 1.4s ease-in-out infinite}
@keyframes bar-sweep{0%{width:0;margin-left:0}50%{width:75%;margin-left:12%}100%{width:0;margin-left:100%}}
.ov-msg{font-size:13px;color:var(--muted);letter-spacing:1px}
.err-box{text-align:center;padding:32px;max-width:480px}.err-icon{font-size:44px;margin-bottom:16px}
.err-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--warning);letter-spacing:2px;margin-bottom:14px}
.err-body{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:20px}.err-steps{font-size:11px;color:var(--muted);line-height:2}
.err-btn{background:linear-gradient(90deg,var(--accent),#0099cc);border:none;border-radius:8px;padding:10px 28px;color:var(--bg);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer}
.no-data{text-align:center;padding:32px;color:var(--muted);font-size:13px}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div class="overlay" id="overlay">
  <div class="ov-logo">AES/DHI VIETNAM</div>

<!-- HEADER -->
<div class="hdr">

<!-- SLIDES -->
<div class="slides">

        <div class="ms-list" id="ms-this"><div class="empty"><span>&#128461;</span>Đang tải...</div></div>

<!-- NAV -->

<div class="prog-bar" id="prog"></div>
<script>
// ============================================================
// CONFIG
// Mode A (GitHub Pages same origin): shares localStorage with BOD Dashboard
// Mode B (any HTTPS origin):         fetches Azure API directly with API key
// file:// protocol cannot do either -> show deployment instructions
// ============================================================
var LS_KEY         = 'bod_dashboard_data_v5_6';
var AZ_KEY_LS      = 'bodDashboardApiKey';
var AZ_URL         = 'https://bod-dashboard-proxy-dhi-fmepb7akaehvfgbr.southeastasia-01.azurewebsites.net/api/blob-proxy';
var AZ_BLOB        = 'dashboard-data-v5.3.json';
var SLIDE_DURATION = 20000;
var POLL_INTERVAL  = 60000;
var isFileProtocol = (location.protocol === 'file:');

var SM = [
  {id:'design',         name:'Design',          icon:'✏️'},
  {id:'bom',            name:'BOM Drawing',      icon:'📋'},
  {id:'price_calc',     name:'Price Calc.',      icon:'💰'},
  {id:'bidding',        name:'Bidding',          icon:'💼'},
  {id:'order',          name:'Order',            icon:'📦'},
  {id:'drawing-release',name:'Drawing Release',  icon:'📐'},
  {id:'assembly',       name:'Assembly',         icon:'🔧'},
  {id:'installation',   name:'Installation',     icon:'⚙️'},
  {id:'testing',        name:'Testing/QC',       icon:'🔬'},
  {id:'commissioning',  name:'Commissioning',    icon:'🔌'},
  {id:'handover',       name:'Handover',         icon:'✅'}
];

var projects = [], members = [], curSlide = 0, slideTimer = null;

// ── CLOCK ──────────────────────────────────────────────────
(function tick(){
  var n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('vi-VN',{hour12:false});
  document.getElementById('date-txt').textContent = n.toLocaleDateString('vi-VN',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'}).toUpperCase();
  setTimeout(tick, 1000);
})();

// ── HELPERS ────────────────────────────────────────────────
function weekBounds(off) {
  var n = new Date(), d = n.getDay();
  var mon = new Date(n);
  mon.setDate(n.getDate() - (d===0 ? 6 : d-1) + off*7);
  mon.setHours(0,0,0,0);
  var sun = new Date(mon);
  sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return {s:mon, e:sun};
}
function fmtD(v) {
  if(!v) return '—';
  var d = (v instanceof Date) ? v : new Date(v);
  return isNaN(d) ? '—' : d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});
}
function msInWeek(ms, wb) {
  var s = ms.planStartDate    ? new Date(ms.planStartDate)    : null;
  var e = ms.planCompleteDate ? new Date(ms.planCompleteDate) : null;
  if(!s && !e) return false;
  var lo = s||e, hi = e||s;
  return lo <= wb.e && hi >= wb.s;
}
function smFind(id) { return SM.find(function(s){return s.id===id;}) || null; }
function memFind(id){ return members.find(function(m){return m.id===id;}) || null; }

// ── APPLY DATA ────────────────────────────────────────────
function applyData(d) {
  projects = d.projects    || [];
  members  = d.teamMembers || [];
  var dot = document.getElementById('live-dot');
  var lbl = document.getElementById('live-lbl');
  dot.className = 'live-dot';
  if(d.lastSave) {
    var age = Math.round((Date.now() - new Date(d.lastSave)) / 60000);
    lbl.textContent = age < 2 ? 'LIVE' : 'CACHE ' + age + 'm';
    if(age > 60) dot.classList.add('stale');
  } else {
    lbl.textContent = 'LIVE';
  }
}

// ── LOAD FROM LOCALSTORAGE (works on same origin as BOD Dashboard) ──
function loadFromLS() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    applyData(JSON.parse(raw));
    return true;
  } catch(e) { return false; }
}

// ── LOAD FROM AZURE API (works on any HTTPS origin) ─────
function loadFromAzure(callback) {
  var apiKey = localStorage.getItem(AZ_KEY_LS) || '';
  if(!apiKey) { callback(false, 'no-key'); return; }
  fetch(AZ_URL, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
    body: JSON.stringify({ action:'read', blobName:AZ_BLOB })
  }).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(d){
    localStorage.setItem(LS_KEY, JSON.stringify(d));
    applyData(d);
    callback(true);
  }).catch(function(e){
    console.warn('Azure fetch error:', e.message);
    callback(false, e.message);
  });
}

// ── MAIN LOAD ORCHESTRATOR ────────────────────────────────
// Returns: true (sync success), false (need async), 'file' (file:// blocked)
function loadData() {
  // 1. Try localStorage (same origin share)
  if(loadFromLS()) return true;
  // 2. file:// cannot fetch, just return false
  if(isFileProtocol) return false;
  // 3. Try Azure API async (HTTPS origin)
  return 'async';
}

// ── SLIDE 1: PROJECTS ─────────────────────────────────────
function renderProjects() {
  console.log('[TV] projects loaded:', projects.length, 'members:', members.length);
  var active = projects.filter(function(p){
    // Status stored as lowercase: 'planning','in-progress','on-hold','delayed','completed','cancelled'
    var s = (p.status||'').toLowerCase();
    return s !== 'completed' && s !== 'cancelled';
  });
  console.log('[TV] active projects:', active.length);
  document.getElementById('proj-badge').textContent = active.length + ' dự án';
  if(!active.length) {
    document.getElementById('proj-grid').innerHTML = '<div class="no-data">Không có dự án đang triển khai</div>';
    return;
  }
  var stMap = {
    'in-progress': ['s-inprogress','In Progress'],
    'delayed':     ['s-delayed','Delayed'],
    'on-hold':     ['s-onhold','On Hold'],
    'planning':    ['s-planning','Planning']
  };
  document.getElementById('proj-grid').innerHTML = active.map(function(p){
    var st  = p.status || 'planning';
    var sm2 = stMap[st] || ['s-planning','Planning'];
    var m   = (p.name||'').match(/^([A-Z0-9\-]+)\s*[-–]\s*(.+)/);
    var code = m ? m[1] : '';
    var dname = m ? m[2] : (p.name || 'Dự án');
    var mls = p.milestones || [];
    var curMs = null;
    for(var i=0; i<mls.length; i++){
      if(mls[i].person && mls[i].actualStartDate && !mls[i].actualCompleteDate){curMs=mls[i];break;}
    }
    if(!curMs){for(var i=mls.length-1;i>=0;i--){if(mls[i].person||mls[i].actualStartDate){curMs=mls[i];break;}}}
    var smCur  = curMs ? smFind(curMs.id) : null;
    var pName  = (curMs && curMs.person) ? ((memFind(curMs.person)||{}).name||'') : '';
    var pips   = SM.map(function(sm3){
      var ms = mls.find(function(x){return x.id===sm3.id;});
      if(!ms) return '<div class="pip"></div>';
      if(ms.actualCompleteDate) return '<div class="pip done"></div>';
      if(ms.actualStartDate) {
        var late = ms.planCompleteDate && new Date(ms.planCompleteDate) < new Date();
        return '<div class="pip '+(late?'late':'active')+'"></div>';
      }
      return '<div class="pip"></div>';
    }).join('');
    return '<div class="proj-card '+st+'">'
      +'<div class="proj-header"><div>'
      +(code?'<div class="proj-code">'+code+'</div>':'')
      +'<div class="proj-name" title="'+(p.name||'')+'">'+dname+'</div>'
      +'</div><span class="s-chip '+sm2[0]+'">'+sm2[1]+'</span></div>'
      +(p.customer?'<div class="proj-customer">👤 '+p.customer+'</div>':'')
      +(smCur?'<div class="proj-ms">'+smCur.icon+' '+smCur.name+(pName?' · '+pName:'')+'</div>':'')
      +'<div class="ms-pips">'+pips+'</div>'
      +'</div>';
  }).join('');
}

// ── SLIDE 2: MILESTONES ────────────────────────────────────
function renderMilestones() {
  var wb0 = weekBounds(0), wb1 = weekBounds(1);
  document.getElementById('this-range').textContent = fmtD(wb0.s)+' – '+fmtD(wb0.e);
  document.getElementById('next-range').textContent = fmtD(wb1.s)+' – '+fmtD(wb1.e);
  renderWeekMs('ms-this', wb0);
  renderWeekMs('ms-next', wb1);
}
function renderWeekMs(elId, wb) {
  var today = new Date(), items = [];
  projects.filter(function(p){
    var s=(p.status||'').toLowerCase();
    return s!=='completed'&&s!=='cancelled';
  }).forEach(function(proj){
      // Regular milestones
      (proj.milestones||[]).forEach(function(ms){
        if(!ms.person || ms.actualCompleteDate) return;
        // Show if deadline falls within week (even without planStartDate)
        var ded = ms.planCompleteDate ? new Date(ms.planCompleteDate) : null;
        if(!ded) return;
        if(ded < wb.s || ded > wb.e) return;
        var ded  = ms.planCompleteDate ? new Date(ms.planCompleteDate) : null;
        items.push({
          proj:proj, ms:ms,
          sm:smFind(ms.id), who:memFind(ms.person),
          over: ded && ded < today,
          end:  ded && ded >= wb.s && ded <= wb.e
        });
      });
    });
  items.sort(function(a,b){
    var da=a.ms.planCompleteDate?new Date(a.ms.planCompleteDate):new Date(9e15);
    var db=b.ms.planCompleteDate?new Date(b.ms.planCompleteDate):new Date(9e15);
    return da-db;
  });
  var el = document.getElementById(elId);
  if(!items.length){
    el.innerHTML='<div class="empty"><span>✨</span>Không có milestone tuần này</div>';
    return;
  }
  el.innerHTML = items.map(function(o){
    var pcode = (o.proj.name||'').match(/^([A-Z0-9\-]+)/);
    pcode = pcode ? pcode[1] : (o.proj.name||'').substring(0,10);
    var cls   = o.over?'overdue':o.end?'ending':'';
    var dCls  = o.over?'overdue':o.end?'ending':'';
    var dlbl  = o.over?'QUÁ HẠN':'DEADLINE';
    return '<div class="ms-item '+cls+'">'
      +'<div><div class="mi-proj">'+pcode+'</div>'
      +'<div class="mi-name">'+(o.sm?o.sm.icon:'▶')+' '+(o.sm?o.sm.name:o.ms.id)+'</div>'
      +'<div class="mi-who">👤 '+(o.who?o.who.name:(o.ms.person||'—'))+'</div></div>'
      +'<div class="mi-dd"><div class="mi-dd-lbl">'+dlbl+'</div>'
      +'<div class="mi-dd-val '+dCls+'">'+fmtD(o.ms.planCompleteDate)+'</div></div></div>';
  }).join('');
}

// ── SLIDE 3: SCHEDULES ─────────────────────────────────────
function renderSchedules() {
  var wb0 = weekBounds(0), wb1 = weekBounds(1);
  document.getElementById('sched-wrap').innerHTML =
    '<div class="wk-sec-title">📅 TUẦN NÀY <small>'+fmtD(wb0.s)+' – '+fmtD(wb0.e)+'</small></div>'
    +buildSchedTbl(wb0)
    +'<div class="wk-sec-title next" style="margin-top:14px">📆 TUẦN TỚI <small>'+fmtD(wb1.s)+' – '+fmtD(wb1.e)+'</small></div>'
    +buildSchedTbl(wb1);
}
function buildSchedTbl(wb) {
  var today = new Date(); today.setHours(0,0,0,0);
  var DAYS=[], DLBL=['T2','T3','T4','T5','T6','T7','CN'];
  for(var i=0;i<7;i++){var d=new Date(wb.s);d.setDate(wb.s.getDate()+i);DAYS.push(d);}
  var asgn = {};

  projects.filter(function(p){
    var s=(p.status||'').toLowerCase();
    return s!=='completed'&&s!=='cancelled';
  }).forEach(function(proj){
      var mc = (proj.name||'').match(/^([A-Z0-9\-]+)/);
      var code = mc ? mc[1] : (proj.name||'').substring(0,8);
      // milestones (installation filtered out - handled via installationPhases)
      (proj.milestones||[]).forEach(function(ms){
        if(!ms.person||!ms.planStartDate) return;
        var sm = smFind(ms.id);
        var ps = new Date(ms.planStartDate); ps.setHours(0,0,0,0);
        var pe = ms.planCompleteDate ? new Date(ms.planCompleteDate) : new Date(ps);
        pe.setHours(23,59,59,0);
        DAYS.forEach(function(d){
          if(d>=ps && d<=pe){
            if(!asgn[ms.person]) asgn[ms.person]={};
            var k = d.toDateString();
            if(!asgn[ms.person][k]) asgn[ms.person][k]=[];
            var t = ['assembly','installation','commissioning'].indexOf(ms.id)>=0 ? 'asm':'ms';
            asgn[ms.person][k].push({label:code+': '+(sm?sm.name:ms.id), type:t});
          }
        });
      });
      // installationPhases (separate array, not in milestones)
      (proj.installationPhases||[]).forEach(function(ph){
        if(!ph.person||!ph.planStartDate||ph.actualCompleteDate) return;
        var ps=new Date(ph.planStartDate); ps.setHours(0,0,0,0);
        var pe=ph.planCompleteDate?new Date(ph.planCompleteDate):new Date(ps); pe.setHours(23,59,59,0);
        DAYS.forEach(function(d){
          if(d>=ps&&d<=pe){
            if(!asgn[ph.person]) asgn[ph.person]={};
            var k=d.toDateString();
            if(!asgn[ph.person][k]) asgn[ph.person][k]=[];
            asgn[ph.person][k].push({label:code+': Installation', type:'asm'});
          }
        });
      });
      // surveyRounds is an OBJECT {survey1:{}, survey2:{}, survey3:{}} not array
      Object.values(proj.surveyRounds||{}).forEach(function(sv){
        if(!sv.person||!sv.startDate) return;
        var sd=new Date(sv.startDate); sd.setHours(0,0,0,0);
        DAYS.forEach(function(d){
          if(d.toDateString()===sd.toDateString()){
            if(!asgn[sv.person]) asgn[sv.person]={};
            var k=d.toDateString();
            if(!asgn[sv.person][k]) asgn[sv.person][k]=[];
            asgn[sv.person][k].push({label:code+': Survey', type:'sv'});
          }
        });
      });
    });

  var active = members.filter(function(m){
    if(m.role==='admin') return false;
    return DAYS.some(function(d){
      return asgn[m.id] && asgn[m.id][d.toDateString()] && asgn[m.id][d.toDateString()].length>0;
    });
  });
  if(!active.length) return '<div class="no-data" style="padding:16px">Không có lịch làm việc tuần này</div>';

  var ths = DAYS.map(function(d){
    var isTd = d.toDateString()===today.toDateString();
    var di = d.getDay()===0?6:d.getDay()-1;
    return '<th class="'+(isTd?'today-h':'')+'">'+DLBL[di]+'<br><small style="font-size:9px;font-weight:400">'+fmtD(d)+'</small></th>';
  }).join('');

  var rows = active.map(function(mem){
    var cells = DAYS.map(function(d){
      var k=d.toDateString(), isTd=d.toDateString()===today.toDateString();
      var tasks=(asgn[mem.id]&&asgn[mem.id][k])||[];
      if(!tasks.length) return '<td class="'+(isTd?'td-today':'')+'"><div class="free">·</div></td>';
      var chips=tasks.map(function(t){
        return '<span class="chip '+t.type+(isTd?' td':'')+'" title="'+t.label+'">'+t.label+'</span>';
      }).join('');
      return '<td class="'+(isTd?'td-today':'')+'">'+chips+'</td>';
    }).join('');
    return '<tr><td class="mem-cell">'+mem.name+(mem.role?'<div class="mem-role">'+mem.role+'</div>':'')+'</td>'+cells+'</tr>';
  }).join('');

  return '<div class="tbl-wrap"><table class="sched-tbl"><thead><tr><th class="name-h">Nhân Viên</th>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

// ── SLIDES ─────────────────────────────────────────────────
var SINFO = [
  {title:'DỰ ÁN ĐANG TRIỂN KHAI',    sub:'ACTIVE PROJECTS — REAL TIME'},
  {title:'MILESTONE TUẦN NÀY & TỚI', sub:'MILESTONE SCHEDULE — WEEKLY VIEW'},
  {title:'LỊCH LÀM VIỆC NHÂN VIÊN',  sub:'STAFF SCHEDULE — WEEKLY VIEW'}
];
function goSlide(idx) {
  var sl=document.querySelectorAll('.slide'), bt=document.querySelectorAll('.nav-btn');
  sl[curSlide].classList.remove('active');
  sl[curSlide].classList.add('leaving');
  var prev=curSlide;
  setTimeout(function(){sl[prev].classList.remove('leaving');}, 650);
  curSlide=idx;
  sl[curSlide].classList.add('active');
  bt.forEach(function(b,i){b.classList.toggle('active', i===curSlide);});
  document.getElementById('hdr-title').textContent = SINFO[curSlide].title;
  document.getElementById('hdr-sub').textContent   = SINFO[curSlide].sub;
  var bar=document.getElementById('prog');
  bar.style.transition='none'; bar.style.width='0%'; void bar.offsetWidth;
  bar.style.transition='width '+SLIDE_DURATION+'ms linear'; bar.style.width='100%';
  clearTimeout(slideTimer);
  slideTimer=setTimeout(function(){goSlide((curSlide+1)%3);}, SLIDE_DURATION);
}

// ── INIT ───────────────────────────────────────────────────
function showError(mode) {
  var ov = document.getElementById('overlay');
  if(mode === 'file') {
    // Cannot use localStorage or fetch from file://
    ov.innerHTML =
      '<div class="err-box" style="max-width:560px">'
      +'<div class="err-icon">📡</div>'
      +'<div class="err-title">CẦN MỞ QUA GITHUB PAGES</div>'
      +'<div class="err-body" style="text-align:left">'
      +'File này đang mở từ <code style="color:var(--warning);background:rgba(255,204,0,.1);padding:1px 6px;border-radius:3px">file://</code> — trình duyệt chặn localStorage giữa các origin khác nhau.<br><br>'
      +'<span class="err-steps">'
      +'<strong style="color:var(--accent)">Cách 1 — Deploy lên cùng GitHub Pages (khuyên dùng):</strong><br>'
      +'1. Copy file này vào thư mục GitHub repo <code style="color:var(--accent2)">phuocdnt/bod-dashboard</code><br>'
      +'2. Đặt tên <code style="color:var(--accent2)">tv.html</code> rồi commit &amp; push<br>'
      +'3. Truy cập <code style="color:var(--accent2)">https://phuocdnt.github.io/bod-dashboard/tv.html</code><br>'
      +'→ Tự động đọc localStorage từ BOD Dashboard ✅<br><br>'
      +'<strong style="color:var(--accent)">Cách 2 — Nhập API Key trực tiếp:</strong><br>'
      +'Nhập API Key để fetch dữ liệu từ Azure (cần HTTPS, không dùng được với file://)<br>'
      +'</span></div>'
      +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
      +'<button class="err-btn" onclick="showApiKeyInput()">🔑 NHẬP API KEY (HTTPS)</button>'
      +'<button class="err-btn" style="background:linear-gradient(90deg,var(--muted),#2a4a6a)" onclick="tryInit()">🔄 THỬ LẠI</button>'
      +'</div>'
      +'</div>';
  } else if(mode === 'no-key') {
    showApiKeyInput();
  } else {
    ov.innerHTML =
      '<div class="err-box">'
      +'<div class="err-icon">⚠️</div>'
      +'<div class="err-title">KHÔNG ĐỌC ĐƯỢC DỮ LIỆU</div>'
      +'<div class="err-body">Không thể kết nối Azure hoặc chưa có dữ liệu trong bộ nhớ.<br><br>'
      +'<span class="err-steps">• Kiểm tra kết nối mạng<br>• Kiểm tra API Key còn hiệu lực<br>• Mở BOD Dashboard để sync dữ liệu về localStorage</span></div>'
      +'<div style="display:flex;gap:10px;justify-content:center">'
      +'<button class="err-btn" onclick="showApiKeyInput()">🔑 ĐỔI API KEY</button>'
      +'<button class="err-btn" style="background:linear-gradient(90deg,var(--muted),#2a4a6a)" onclick="tryInit()">🔄 THỬ LẠI</button>'
      +'</div></div>';
  }
}

function showApiKeyInput() {
  var saved = localStorage.getItem(AZ_KEY_LS) || '';
  document.getElementById('overlay').innerHTML =
    '<div class="err-box" style="max-width:420px">'
    +'<div class="err-icon">🔑</div>'
    +'<div class="err-title">NHẬP API KEY</div>'
    +'<div class="err-body" style="margin-bottom:16px">Nhập API Key để fetch dữ liệu từ Azure Blob Storage.<br>'
    +'<small style="color:var(--muted)">(Cùng key đang dùng trong BOD Dashboard)</small></div>'
    +'<input id="tv-api-key" type="password" placeholder="Nhập API Key..." value="'+saved+'"'
    +' style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:14px;box-sizing:border-box">'
    +'<div style="display:flex;gap:10px">'
    +'<button class="err-btn" style="flex:1" onclick="submitApiKey()">KẾT NỐI AZURE</button>'
    +'<button class="err-btn" style="flex:0 0 auto;background:linear-gradient(90deg,var(--muted),#2a4a6a)" onclick="tryInit()">HỦY</button>'
    +'</div></div>';
  setTimeout(function(){
    var inp = document.getElementById('tv-api-key');
    if(inp){ inp.focus(); inp.addEventListener('keydown',function(e){if(e.key==='Enter') submitApiKey();}); }
  }, 100);
}

function submitApiKey() {
  var inp = document.getElementById('tv-api-key');
  if(!inp) return;
  var key = inp.value.trim();
  if(!key) return;
  localStorage.setItem(AZ_KEY_LS, key);
  tryInit();
}

function renderAll() {
  renderProjects();
  renderMilestones();
  renderSchedules();
}

function startDashboard() {
  renderAll();
  var ov = document.getElementById('overlay');
  ov.style.transition='opacity .4s'; ov.style.opacity='0';
  setTimeout(function(){ov.style.display='none';}, 450);
  document.getElementById('hdr-title').textContent = SINFO[0].title;
  document.getElementById('hdr-sub').textContent   = SINFO[0].sub;
  var bar=document.getElementById('prog');
  bar.style.transition='none'; bar.style.width='0%'; void bar.offsetWidth;
  bar.style.transition='width '+SLIDE_DURATION+'ms linear'; bar.style.width='100%';
  clearTimeout(slideTimer);
  slideTimer=setTimeout(function(){goSlide(1);}, SLIDE_DURATION);
  // Periodic refresh: localStorage (fast) then Azure (if HTTPS)
  setInterval(function(){
    if(!loadFromLS() && !isFileProtocol) {
      loadFromAzure(function(ok){ if(ok) renderAll(); });
    } else {
      renderAll();
    }
  }, POLL_INTERVAL);
}

function tryInit() {
  var ov = document.getElementById('overlay');
  ov.innerHTML = '<div class="ov-logo">AES/DHI VIETNAM</div><div class="ov-bar-wrap"><div class="ov-bar"></div></div><div class="ov-msg" id="ov-msg">Đang tải dữ liệu...</div>';
  ov.style.opacity='1'; ov.style.display='flex';

  setTimeout(function(){
    var result = loadData();

    if(result === true) {
      // Got data from localStorage immediately
      startDashboard();
    } else if(result === false && isFileProtocol) {
      // Local file cannot fetch CORS — show deploy instructions
      showError('file');
    } else {
      // HTTPS origin, no localStorage data, try Azure
      document.getElementById('ov-msg').textContent = 'Đang kết nối Azure...';
      var apiKey = localStorage.getItem(AZ_KEY_LS);
      if(!apiKey) { showError('no-key'); return; }
      loadFromAzure(function(ok, reason){
        if(ok) {
          startDashboard();
        } else {
          showError(reason === 'no-key' ? 'no-key' : 'error');
        }
      });
    }
  }, 600);
}

// Keyboard shortcuts
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goSlide((curSlide+1)%3);
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   goSlide((curSlide+2)%3);
  if(e.key==='r'||e.key==='R'){ if(loadData()) renderAll(); }
  if(e.key==='d'||e.key==='D'){
    var raw=localStorage.getItem(LS_KEY);
    if(!raw){alert('localStorage EMPTY for key: '+LS_KEY);return;}
    var d=JSON.parse(raw);
    var statuses={};
    (d.projects||[]).forEach(function(p){statuses[p.status||'?']=(statuses[p.status||'?']||0)+1;});
    alert('DATA DEBUG
'
      +'Projects: '+(d.projects||[]).length+'
'
      +'Members: '+(d.teamMembers||[]).length+'
'
      +'LastSave: '+d.lastSave+'
'
      +'Status breakdown:
'+JSON.stringify(statuses,null,2));
  }
});

tryInit();
</script>
