<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights Discovery – Deep Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080C12;--sur:#0F141D;--sur2:#161E2C;--sur3:#1C2535;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.14);
  --txt:#E8EDF5;--muted:#64748B;--muted2:#8B949E;
  --ff:'DM Sans',sans-serif;--fd:'Playfair Display',serif;
  --accent:#F5A623;
  /* color vars set dynamically by JS */
  --primary:#2B6CB0;--primary-s:rgba(43,108,176,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.6}

/* ── LOADING STATE ── */
#loadingScreen{
  position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:1000;gap:20px;
  transition:opacity .5s ease;
}
#loadingScreen.fade-out{opacity:0;pointer-events:none}
.load-wheel{
  width:64px;height:64px;border-radius:50%;
  background:conic-gradient(#E8392A 0 90deg,#F5A623 90deg 180deg,#3CB371 180deg 270deg,#2B6CB0 270deg 360deg);
  animation:spin 2s linear infinite;filter:drop-shadow(0 0 20px rgba(245,166,35,.4));
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:14px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.load-steps{display:flex;flex-direction:column;gap:8px;margin-top:8px;min-height:80px}
.load-step{font-size:13px;color:var(--muted2);display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(6px);transition:all .4s ease}
.load-step.active{opacity:1;transform:translateY(0);color:var(--accent)}
.load-step.done{opacity:.5;color:var(--muted)}
.load-step::before{content:'○';flex-shrink:0}
.load-step.active::before{content:'◉';color:var(--accent)}
.load-step.done::before{content:'●';color:var(--muted)}

/* ── LAYOUT ── */
.page{max-width:900px;margin:0 auto;padding:40px 24px 80px;opacity:0;transition:opacity .6s ease}
.page.visible{opacity:1}
@media(max-width:600px){.page{padding:24px 16px 60px}}

/* ── HERO HEADER ── */
.hero{
  border-radius:20px;overflow:hidden;margin-bottom:32px;
  position:relative;
}
.hero-bg{
  padding:48px 40px 40px;position:relative;
  background:var(--hero-grad, linear-gradient(135deg,#0a1628,#1e3a5f,#1d4ed8));
}
.hero-noise{
  position:absolute;inset:0;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;pointer-events:none;
}
.hero-wheel-deco{
  position:absolute;right:-60px;top:-60px;width:320px;height:320px;
  border-radius:50%;
  background:conic-gradient(rgba(232,57,42,.15) 0 90deg,rgba(245,166,35,.15) 90deg 180deg,rgba(60,179,113,.15) 180deg 270deg,rgba(43,108,176,.15) 270deg 360deg);
  filter:blur(40px);pointer-events:none;
}
.hero-label{
  font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.55);margin-bottom:12px;
}
.hero-name{
  font-family:var(--fd);font-size:clamp(2rem,5vw,3rem);font-weight:600;
  line-height:1.15;margin-bottom:6px;color:#fff;
}
.hero-role{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:20px}
.hero-colors{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.hero-primary{
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.25);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:30px;padding:8px 16px;
}
.hero-primary-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.hero-primary-label{font-size:13px;font-weight:600;color:#fff}
.hero-primary-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px}
.hero-secondary{
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.2);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:30px;padding:6px 12px;
}
.hero-secondary-dot{width:9px;height:9px;border-radius:50%}
.hero-secondary-label{font-size:12px;color:rgba(255,255,255,.75)}

/* Energy bars in hero */
.hero-bars{
  background:rgba(0,0,0,.3);backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.1);
  padding:20px 40px;display:flex;gap:20px;flex-wrap:wrap;
}
@media(max-width:600px){.hero-bars{padding:16px 20px;gap:12px}}
.energy-item{flex:1;min-width:120px}
.ei-label{font-size:11px;font-weight:600;letter-spacing:.5px;margin-bottom:6px;display:flex;justify-content:space-between}
.ei-bar{height:5px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.ei-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.ei-score{font-size:10px;color:rgba(255,255,255,.5)}

/* ── SECTION ── */
.section{margin-bottom:28px}
.section-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;padding-bottom:12px;
  border-bottom:1px solid var(--bdr2);
}
.section-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  background:var(--primary-s);
}
.section-title{font-family:var(--fd);font-size:1.25rem;font-weight:600;color:var(--txt)}
.section-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* ── CARD TYPES ── */
.card{
  background:var(--sur);border:1px solid var(--bdr);
  border-radius:14px;padding:22px;margin-bottom:12px;
}
.card-title{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted2);margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.card-title::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* Prose paragraphs */
.prose{font-size:14px;line-height:1.85;color:rgba(232,237,245,.82)}
.prose p{margin-bottom:12px}
.prose p:last-child{margin-bottom:0}

/* Bullet lists */
.blist{list-style:none;display:flex;flex-direction:column;gap:8px}
.blist li{
  font-size:13.5px;line-height:1.6;color:rgba(232,237,245,.8);
  display:flex;gap:10px;padding:8px 12px;
  background:var(--sur2);border-radius:8px;border:1px solid var(--bdr);
}
.blist li .dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  margin-top:7px;background:var(--primary);
}
.blist.do li .dot{background:#3CB371}
.blist.dont li .dot{background:#E8392A}
.blist.dev li .dot{background:var(--accent)}

/* 2-col grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}

/* 3-col grid */
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:700px){.grid3{grid-template-columns:1fr}}

/* Tag pills */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tag{
  font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;
  border:1px solid;display:inline-block;
}

/* Conflict badge */
.conflict-badge{
  border-radius:12px;padding:16px;border:1px solid var(--bdr);
  background:var(--sur2);
}
.cb-mode{font-size:16px;font-weight:700;margin-bottom:4px}
.cb-desc{font-size:12px;color:var(--muted2);line-height:1.6}

/* Score bar for profile dimensions */
.dim-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.dim-row:last-child{border-bottom:none}
.dim-label{width:180px;font-size:12px;font-weight:600;flex-shrink:0;color:var(--muted2)}
.dim-bar{flex:1;height:6px;background:var(--bdr);border-radius:99px;overflow:hidden}
.dim-fill{height:100%;border-radius:99px;transition:width 1s ease}
.dim-val{width:40px;text-align:right;font-size:12px;font-weight:700;flex-shrink:0}

/* Highlight quote */
.highlight-quote{
  background:linear-gradient(135deg,var(--primary-s),rgba(245,166,35,.05));
  border-left:3px solid var(--primary);
  border-radius:0 12px 12px 0;
  padding:16px 20px;margin:16px 0;
  font-family:var(--fd);font-size:1.05rem;font-style:italic;
  color:rgba(232,237,245,.9);line-height:1.7;
}

/* IE badge */
.ie-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 16px;border-radius:10px;border:1px solid var(--bdr);
  background:var(--sur2);font-size:13px;font-weight:600;
}

/* Development item */
.dev-item{
  display:flex;gap:12px;padding:12px;
  background:var(--sur2);border-radius:10px;border:1px solid var(--bdr);
  margin-bottom:8px;
}
.dev-num{
  width:24px;height:24px;border-radius:50%;
  background:rgba(245,166,35,.2);color:var(--accent);
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.dev-text{font-size:13px;line-height:1.6;color:rgba(232,237,245,.8)}

/* Print / Export button */
.export-bar{
  position:fixed;bottom:24px;right:24px;
  display:flex;gap:10px;z-index:100;
}
.btn-export{
  display:flex;align-items:center;gap:8px;
  padding:12px 20px;border-radius:12px;border:none;cursor:pointer;
  font-family:var(--ff);font-size:13px;font-weight:600;
  transition:all .2s;
}
.btn-print{background:var(--sur2);color:var(--txt);border:1px solid var(--bdr2)}
.btn-print:hover{background:var(--sur3)}
.btn-close-prof{background:linear-gradient(135deg,var(--primary),#1E40AF);color:#fff}
.btn-close-prof:hover{transform:translateY(-1px)}

/* Section nav (sticky) */
.sticky-nav{
  position:sticky;top:0;z-index:50;
  background:rgba(8,12,18,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bdr);
  padding:0 24px;overflow-x:auto;white-space:nowrap;
  display:flex;gap:0;
  margin:0 -24px 32px;
}
.nav-item{
  padding:14px 16px;font-size:12px;font-weight:600;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;
  text-decoration:none;display:inline-block;
}
.nav-item:hover{color:var(--txt)}
.nav-item.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Error state */
.error-state{
  text-align:center;padding:80px 20px;
}
.error-state h2{font-family:var(--fd);font-size:1.8rem;margin-bottom:12px;color:var(--muted2)}
.error-state p{color:var(--muted);font-size:14px;line-height:1.7}

@media print{
  .export-bar,.sticky-nav{display:none}
  .page{padding:0}
  .hero-bars{break-inside:avoid}
  .section{break-inside:avoid}
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <div class="load-wheel"></div>
  <div class="load-text">Đang tạo profile cá nhân</div>
  <div class="load-steps">
    <div class="load-step" id="step1">Đọc dữ liệu khảo sát</div>
    <div class="load-step" id="step2">Phân tích màu năng lượng</div>
    <div class="load-step" id="step3">AI đang sinh nội dung profile</div>
    <div class="load-step" id="step4">Hoàn thiện & trình bày</div>
  </div>
</div>

<!-- MAIN PAGE (hidden until AI done) -->
<div class="page" id="mainPage">

  <!-- HERO -->
  <div class="hero" id="heroSection">
    <div class="hero-bg" id="heroBg">
      <div class="hero-noise"></div>
      <div class="hero-wheel-deco"></div>
      <div class="hero-label" id="heroLabel">DHI CO LTD · INSIGHTS DISCOVERY PERSONAL PROFILE</div>
      <div class="hero-name" id="heroName">–</div>
      <div class="hero-role" id="heroRole">–</div>
      <div class="hero-colors" id="heroColors"></div>
    </div>
    <div class="hero-bars" id="heroBars"></div>
  </div>

  <!-- STICKY NAV -->
  <nav class="sticky-nav">
    <a href="#overview" class="nav-item active">🧠 Tổng quan</a>
    <a href="#strengths" class="nav-item">💪 Điểm mạnh</a>
    <a href="#communication" class="nav-item">💬 Giao tiếp</a>
    <a href="#blindspots" class="nav-item">🔍 Điểm mù</a>
    <a href="#opposite" class="nav-item">⚡ Đối lập</a>
    <a href="#leadership" class="nav-item">👑 Lãnh đạo</a>
    <a href="#management" class="nav-item">🤝 Quản lý</a>
    <a href="#development" class="nav-item">🚀 Phát triển</a>
  </nav>

  <!-- SECTIONS will be injected here by renderProfile() -->
  <div id="profileContent"></div>

</div>

<!-- EXPORT BAR -->
<div class="export-bar">
  <button class="btn-export btn-print" onclick="window.print()">🖨️ In</button>
  <button class="btn-export btn-close-prof" onclick="window.close()">✕ Đóng</button>
</div>

<script>
// ════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════
const CI = {
  red:   {l:'Fiery Red',    e:'🔴',c:'#E8392A', grad:'linear-gradient(135deg,#3d0c0c,#7f1d1d,#c0291c)', s:'rgba(232,57,42,.12)'},
  yellow:{l:'Sunshine Yellow',e:'🟡',c:'#F5A623', grad:'linear-gradient(135deg,#3d2000,#78350f,#b45309)', s:'rgba(245,166,35,.12)'},
  green: {l:'Earth Green',  e:'🟢',c:'#3CB371', grad:'linear-gradient(135deg,#052e16,#14532d,#166534)', s:'rgba(60,179,113,.12)'},
  blue:  {l:'Cool Blue',    e:'🔵',c:'#2B6CB0', grad:'linear-gradient(135deg,#0a1628,#1e3a5f,#1d4ed8)', s:'rgba(43,108,176,.12)'}
};

const ROLE8_MAP = {
  'red-yellow':'Motivator','red-blue':'Reformer','red-green':'Director','red-red':'Director',
  'yellow-red':'Inspirer','yellow-green':'Inspiring Helper','yellow-blue':'Inspirer','yellow-yellow':'Inspirer',
  'green-yellow':'Inspiring Helper','green-blue':'Supporter','green-red':'Supporter','green-green':'Supporter',
  'blue-green':'Coordinator','blue-yellow':'Observer','blue-red':'Observer','blue-blue':'Observer'
};

const OPPOSITE = {red:'green',yellow:'blue',green:'red',blue:'yellow'};

// ════════════════════════════════════════════════════════════
// PARSE URL PARAMS
// ════════════════════════════════════════════════════════════
function getParams(){
  const p = new URLSearchParams(window.location.search);
  return {
    name:       p.get('name')      || 'Nhân Viên',
    role:       p.get('role')      || '',
    dept:       p.get('dept')      || '',
    primary:    p.get('primary')   || 'blue',
    secondary:  p.get('secondary') || 'green',
    redScore:   parseInt(p.get('r')||'0'),
    yellowScore:parseInt(p.get('y')||'0'),
    greenScore: parseInt(p.get('g')||'0'),
    blueScore:  parseInt(p.get('b')||'0'),
    ieType:     p.get('ie')        || '',
    leadStyle:  p.get('lead')      || '',
    stress:     p.get('stress')    || '',
    archetype:  p.get('arch')      || '',
  };
}

// ════════════════════════════════════════════════════════════
// LOADING STEPS
// ════════════════════════════════════════════════════════════
function setStep(n){
  for(let i=1;i<=4;i++){
    const el=document.getElementById('step'+i);
    if(i<n) {el.classList.remove('active');el.classList.add('done');}
    else if(i===n){el.classList.add('active');el.classList.remove('done');}
    else {el.classList.remove('active','done');}
  }
}

// ════════════════════════════════════════════════════════════
// BUILD HERO
// ════════════════════════════════════════════════════════════
function buildHero(params){
  const pc = CI[params.primary] || CI.blue;
  const sc = CI[params.secondary] || CI.green;
  const total = (params.redScore+params.yellowScore+params.greenScore+params.blueScore)||24;
  const pct = v => Math.round(v/total*100);

  // Set CSS vars
  document.documentElement.style.setProperty('--primary', pc.c);
  document.documentElement.style.setProperty('--primary-s', pc.s);
  document.getElementById('heroBg').style.background = pc.grad;

  document.getElementById('heroName').textContent = params.name;
  document.getElementById('heroRole').textContent =
    [params.role, params.dept].filter(Boolean).join(' · ') || 'DHI CO LTD';

  // Colors row
  const roleWheel = ROLE8_MAP[`${params.primary}-${params.secondary}`] || '';
  document.getElementById('heroColors').innerHTML = `
    <div class="hero-primary">
      <div class="hero-primary-dot" style="background:${pc.c};box-shadow:0 0 8px ${pc.c}88"></div>
      <div>
        <div class="hero-primary-label">${pc.e} ${pc.l}</div>
        <div class="hero-primary-sub">${roleWheel ? 'Vai trò: '+roleWheel : 'Màu chủ đạo'}</div>
      </div>
    </div>
    <div class="hero-secondary">
      <div class="hero-secondary-dot" style="background:${sc.c}"></div>
      <span class="hero-secondary-label">${sc.e} ${sc.l}</span>
    </div>
    ${params.ieType ? `<div class="hero-secondary"><span class="hero-secondary-label">${params.ieType==='Extrovert'?'🌟 Hướng ngoại':'🌙 Hướng nội'}</span></div>` : ''}
  `;

  // Energy bars
  const bars = [
    ['red',params.redScore],['yellow',params.yellowScore],
    ['green',params.greenScore],['blue',params.blueScore]
  ];
  document.getElementById('heroBars').innerHTML = bars.map(([c,sc2])=>`
    <div class="energy-item">
      <div class="ei-label">
        <span style="color:${CI[c].c}">${CI[c].e} ${CI[c].l.split(' ')[0]}</span>
        <span class="ei-score">${pct(sc2)}%</span>
      </div>
      <div class="ei-bar">
        <div class="ei-fill" id="bar-${c}" style="width:0%;background:${CI[c].c}"></div>
      </div>
    </div>
  `).join('');

  // Animate bars after short delay
  setTimeout(()=>{
    bars.forEach(([c,sc2])=>{
      const el=document.getElementById('bar-'+c);
      if(el) el.style.width=pct(sc2)+'%';
    });
  },200);
}

// ════════════════════════════════════════════════════════════
// AI PROMPT — Vietnamese, maximum depth
// ════════════════════════════════════════════════════════════
function buildPrompt(params){
  const pc = CI[params.primary]||CI.blue;
  const sc = CI[params.secondary]||CI.green;
  const total = (params.redScore+params.yellowScore+params.greenScore+params.blueScore)||24;
  const pct = v => Math.round(v/total*100);
  const oppColor = OPPOSITE[params.primary]||'yellow';
  const oppCI = CI[oppColor];
  const roleWheel = ROLE8_MAP[`${params.primary}-${params.secondary}`]||'';

  const CONFLICT_MAP = {
    red:'Competing (Cạnh tranh) — quyết đoán, ít nhượng bộ',
    yellow:'Collaborating (Hợp tác) — tìm win-win, mở rộng giải pháp',
    green:'Accommodating/Avoiding — ưu tiên hòa khí, tránh đối đầu',
    blue:'Compromising/Avoiding — phân tích kỹ, tìm điểm trung hòa'
  };
  const LEAD_MAP = {
    red:'Lãnh đạo Kết quả — giao mục tiêu, đòi hỏi trách nhiệm',
    yellow:'Lãnh đạo Truyền cảm hứng — tạo động lực và văn hóa tích cực',
    green:'Lãnh đạo Phục vụ — đặt con người trước kết quả',
    blue:'Lãnh đạo Chiến lược — xây hệ thống, đảm bảo chất lượng'
  };
  const STRESS_MAP = {
    red:'Kiểm soát tăng cao — độc đoán, thiếu kiên nhẫn',
    yellow:'Phân tán, hời hợt — mất tập trung, dễ xúc động',
    green:'Thu mình, im lặng — tránh né, cảm xúc bị kìm nén',
    blue:'Phân tích quá mức — tê liệt, không thể quyết định'
  };

  return `Bạn là chuyên gia Insights Discovery được đào tạo chuyên sâu bởi Insights Learning & Development (Dundee, Scotland). Bạn viết profile tâm lý cá nhân theo phong cách của Insights Discovery Personal Profile — giàu ngữ nghĩa, tinh tế, cá nhân hóa sâu sắc và thực tế.

DỮ LIỆU NGƯỜI DÙNG:
- Tên: ${params.name}
- Chức danh: ${params.role||'chưa cung cấp'}
- Phòng ban: ${params.dept||'chưa cung cấp'}

function li(arr, cls=''){
  if(!arr||!arr.length) return '';
  return arr.map(t=>`<li class=""><div class="dot"></div><span>${t}</span></li>`).join('');
}

// STICKY NAV ACTIVE STATE
// ════════════════════════════════════════════════════════════
function initStickyNav(){
  const sections = ['overview','strengths','communication','blindspots','opposite','leadership','management','development'];
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        const active = document.querySelector(`.nav-item[href="#${entry.target.id}"]`);
        if(active) active.classList.add('active');
      }
    });
  },{threshold:0.3,rootMargin:'-80px 0px -60% 0px'});
  sections.forEach(id=>{ const el=document.getElementById(id); if(el) observer.observe(el); });
}

    if(!res.ok) throw new Error('API '+res.status);
    const apiData = await res.json();
    const rawText = apiData.content.map(b=>b.text||'').join('').trim();
    const text = rawText.replace(/^```(?:json)?\n?/,'').replace(/\n?```$/,'').trim();
    profileData = JSON.parse(text);
  }catch(err){
    console.error('AI error:',err);
    document.getElementById('profileContent').innerHTML=`
      <div class="error-state">
        <h2>Không thể tạo profile</h2>
        <p>Lỗi kết nối AI: ${err.message}<br>Vui lòng thử lại hoặc kiểm tra kết nối mạng.</p>
      </div>`;
    setStep(4);
    document.getElementById('loadingScreen').classList.add('fade-out');
    document.getElementById('mainPage').classList.add('visible');
    return;
  }

  setStep(4);
  renderProfile(profileData, params);
  await new Promise(r=>setTimeout(r,300));

  document.getElementById('loadingScreen').classList.add('fade-out');
  document.getElementById('mainPage').classList.add('visible');
  setTimeout(initStickyNav, 600);
}

main();
</script>
</body>
</html>
