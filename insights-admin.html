<style>
:root{
  --red:#E8392A;--yellow:#F5A623;--green:#3CB371;--blue:#2B6CB0;
  --bg:#0D1117;--sur:#161B22;--sur2:#1C2333;--sur3:#21262D;
  --bdr:rgba(255,255,255,.08);--bdr2:rgba(255,255,255,.14);
  --txt:#E6EDF3;--muted:#8B949E;--muted2:#6E7681;
  --ff:'DM Sans',sans-serif;--fd:'Cormorant Garamond',serif;
  --sidebar:260px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar{height:52px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;flex-shrink:0}
.tb-logo{display:flex;align-items:center;gap:10px}
.tb-wheel{width:24px;height:24px;border-radius:50%;background:conic-gradient(var(--red) 0 90deg,var(--yellow) 90deg 180deg,var(--green) 180deg 270deg,var(--blue) 270deg 360deg);animation:spin 20s linear infinite;flex-shrink:0}
.tb-logo span{font-weight:600;font-size:14px}
.tb-logo em{font-style:normal;color:var(--muted);font-weight:400;font-size:13px}
.tag-admin{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:rgba(37,99,235,.2);color:#60a5fa;padding:3px 10px;border-radius:99px;border:1px solid rgba(37,99,235,.3)}
.main-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--sur);border-right:1px solid var(--bdr);padding:20px 0;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.sb-sec{padding:0 16px 16px;border-bottom:1px solid var(--bdr)}
.sb-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);padding:12px 16px 8px;display:block}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:var(--sur2);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--bdr)}
.stat-box .sv{font-size:1.4rem;font-weight:700;line-height:1}
.stat-box .sl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.color-dist{display:flex;flex-direction:column;gap:6px;padding:0 16px 0}
.cd-row{display:flex;align-items:center;gap:8px}
.cd-bg{flex:1;height:6px;background:var(--bdr);border-radius:99px;overflow:hidden}
.cd-fill{height:100%;border-radius:99px;transition:width .8s ease}
.cd-val{font-size:11px;color:var(--muted);min-width:28px;text-align:right}
.filter-wrap{padding:8px 16px}
.filter-wrap input,.filter-wrap select{width:100%;background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);border-radius:8px;padding:8px 10px;font-family:var(--ff);font-size:13px;outline:none;margin-bottom:6px}
.filter-wrap input:focus,.filter-wrap select:focus{border-color:var(--blue)}
.filter-wrap input::placeholder{color:var(--muted)}
.filter-wrap select option{background:var(--sur2)}
@media(max-width:720px){.sidebar{display:none}}
.content{flex:1;overflow-y:auto;padding:24px}
.tbl-wrap{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;overflow:hidden}
.tbl-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bdr)}
.tbl-hdr h2{font-size:15px;font-weight:600}
.btn-refresh{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:var(--sur2);border:1px solid var(--bdr);color:var(--muted);cursor:pointer;font-family:var(--ff);font-size:12px;transition:all .2s}
.btn-refresh:hover{color:var(--txt);border-color:var(--bdr2)}
.btn-recalc{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);color:var(--yellow);cursor:pointer;font-family:var(--ff);font-size:12px;transition:all .2s}
.btn-recalc:hover{background:rgba(245,166,35,.2);border-color:rgba(245,166,35,.5)}
.btn-recalc:disabled{opacity:.5;cursor:not-allowed}
table.tbl{width:100%;border-collapse:collapse}
table.tbl th{text-align:left;padding:10px 16px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);background:var(--sur2);border-bottom:1px solid var(--bdr)}
table.tbl td{padding:12px 16px;border-bottom:1px solid var(--bdr);font-size:13.5px;vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr:hover td{background:rgba(255,255,255,.02);cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.score-mini{display:flex;gap:3px}
.score-seg{height:4px;width:18px;border-radius:99px}
.name-cell{display:flex;flex-direction:column}
.name-cell .nm{font-weight:600}
.name-cell .rl{font-size:11px;color:var(--muted)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{font-size:2.5rem;margin-bottom:12px}
.spinner-row{display:flex;justify-content:center;padding:48px}
.spinner{width:32px;height:32px;border:3px solid var(--bdr2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.spin-sm{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--sur);border:1px solid var(--bdr2);border-radius:20px;width:100%;max-width:700px;overflow:hidden;transform:translateY(20px);transition:transform .25s;flex-shrink:0;margin:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-hero{padding:28px 28px 20px;position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:var(--sur2);border:1px solid var(--bdr);color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{color:var(--txt)}
.m-badge{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px}
.m-name{font-family:var(--fd);font-size:1.9rem;font-weight:300;margin-bottom:4px}
.m-sub{color:var(--muted);font-size:13px}
.modal-tabs{display:flex;gap:2px;padding:0 28px;border-bottom:1px solid var(--bdr);background:var(--sur2)}
.m-tab{padding:9px 14px;border:none;background:none;color:var(--muted);font-family:var(--ff);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.m-tab.active{color:var(--txt);border-bottom-color:var(--yellow)}
.m-pane{display:none;padding:20px 28px}
.m-pane.active{display:block}
.m-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.m-label::after{content:'';flex:1;height:1px;background:var(--bdr)}
.energy-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.e-box{background:var(--sur2);border-radius:10px;padding:14px;border:1px solid var(--bdr)}
.e-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.e-name{font-size:12px;font-weight:600}
.e-score{font-size:12px;color:var(--muted)}
.e-bar-bg{height:5px;background:var(--bdr);border-radius:99px;overflow:hidden}
.e-bar-fill{height:100%;border-radius:99px;transition:width 1s ease .2s}
.p2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.p-box{background:var(--sur2);border-radius:10px;padding:14px;border:1px solid var(--bdr)}
.p-box h4{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:10px}
.p-box ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.p-box li{font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.8);display:flex;gap:6px}
.p-box li::before{content:'·';flex-shrink:0;color:var(--muted)}
.p-prose{font-size:13.5px;line-height:1.8;color:rgba(232,237,243,.85)}
.p-prose p{margin-bottom:10px}
.ai-narrative-block{background:rgba(245,166,35,.05);border:1px solid rgba(245,166,35,.2);border-radius:12px;padding:16px;margin-bottom:14px}
.ai-narrative-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);margin-bottom:12px}
.ai-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.ai-list li{font-size:12.5px;line-height:1.5;color:rgba(232,237,243,.8);display:flex;gap:7px;padding:7px 10px;background:var(--sur);border-radius:8px;border:1px solid var(--bdr)}
.ai-list li::before{content:'↗';color:var(--yellow);flex-shrink:0;font-size:11px}
.dims3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.dim-card{background:var(--sur2);border-radius:10px;padding:14px;border:1px solid var(--bdr)}
.dim-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);margin-bottom:6px}
.dim-val{font-size:13px;font-weight:600}
.modal-footer{padding:14px 28px;border-top:1px solid var(--bdr);display:flex;gap:10px;flex-wrap:wrap}
.btn-pdf{flex:1;min-width:140px;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:10px;background:linear-gradient(135deg,#E8392A,#c0291c);color:#fff;border:none;cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:600;transition:all .2s;box-shadow:0 3px 16px rgba(232,57,42,.3)}
.btn-pdf:hover{transform:translateY(-1px)}
.btn-close2{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:10px;background:var(--sur2);color:var(--muted);border:1px solid var(--bdr);cursor:pointer;font-family:var(--ff);font-size:13px;transition:all .2s}
.btn-close2:hover{color:var(--txt)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;z-index:999;transition:transform .3s ease;white-space:nowrap;border:1px solid var(--bdr2)}
#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:480px){.energy-row,.p2col,.dims3{grid-template-columns:1fr}.ai-list{grid-template-columns:1fr}}
</style>
</head>

<script>

yellow:{l:'Sunshine Yellow',e:'🟡',c:'#F5A623',tag:'Người Truyền Cảm Hứng Sáng Tạo',grad:'linear-gradient(135deg,#3d2000,#78350f)',s:['Nhiệt tình, tạo động lực cho người khác','Sáng tạo và linh hoạt trong tiếp cận','Xây dựng mối quan hệ và không khí tích cực','Nhìn thấy tiềm năng trong mọi tình huống'],b:['Thiếu tập trung, dễ bị phân tâm','Lạc quan quá mức, bỏ qua rủi ro','Khó hoàn thành việc chi tiết, tỉ mỉ'],t:['Tạo không gian chia sẻ ý tưởng','Phản hồi nhiệt tình','Giúp họ tập trung ưu tiên chính','Công nhận đóng góp thường xuyên']},
green:{l:'Earth Green',e:'🟢',c:'#3CB371',tag:'Người Kết Nối Đội Nhóm',grad:'linear-gradient(135deg,#052e16,#14532d)',s:['Đồng cảm sâu sắc và lắng nghe chủ động','Xây dựng lòng tin và quan hệ bền vững','Kiên nhẫn, ổn định trong mọi tình huống','Đảm bảo hòa hợp và đồng thuận nhóm'],b:['Khó nói "không", dễ bị quá tải','Tránh xung đột dù đôi khi cần thiết','Quyết định chậm khi có nhiều ý kiến'],t:['Tạo không gian an toàn để chia sẻ','Không ép quyết định quá nhanh','Công nhận sự đóng góp thầm lặng','Thể hiện sự quan tâm thực sự']},
blue:{l:'Cool Blue',e:'🔵',c:'#2B6CB0',tag:'Chuyên Gia Phân Tích & Chất Lượng',grad:'linear-gradient(135deg,#0a1628,#1e3a5f)',s:['Phân tích logic và tư duy hệ thống','Chú trọng chi tiết và đảm bảo chất lượng cao','Cẩn thận và chính xác trong từng bước','Duy trì tiêu chuẩn và quy trình rõ ràng'],b:['Phân tích quá lâu, chậm ra quyết định','Đôi khi quá hoàn hảo chủ nghĩa','Ít biểu lộ cảm xúc, có vẻ xa cách'],t:['Cung cấp tài liệu chi tiết trước họp','Trình bày bằng dữ liệu và logic','Tôn trọng thời gian phân tích','Không ép quyết định nhanh']}};

function toast(m,e=false){const t=document.getElementById('toast');t.textContent=m;t.style.background=e?'#7f1d1d':'#1e293b';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function normalizeItem(raw){
  return{
    ID:raw.ID||raw.id||raw.Id,
    Title:raw.Title||raw.title||raw.name||'',
    EmployeeRole:raw.EmployeeRole||raw.employeeRole||raw.role||'',
    Department:raw.Department||raw.department||'',
    Answers:raw.Answers||raw.answers||'',
    RedScore:Number(raw.RedScore||raw.redScore||0),
    YellowScore:Number(raw.YellowScore||raw.yellowScore||0),
    GreenScore:Number(raw.GreenScore||raw.greenScore||0),
    BlueScore:Number(raw.BlueScore||raw.blueScore||0),
    PrimaryColor:(raw.PrimaryColor||raw.primaryColor||'blue').toLowerCase(),
    SecondaryColor:(raw.SecondaryColor||raw.secondaryColor||'green').toLowerCase(),
    IEType:raw.IEType||raw.ieType||'',
    LeadStyle:(raw.LeadStyle||raw.leadStyle||'').toLowerCase(),
    StressBehavior:(raw.StressBehavior||raw.stressBehavior||'').toLowerCase(),
    Archetype:raw.Archetype||raw.archetype||'',
    AIProfile:raw.AIProfile||raw.aiProfile||null,
    Created:raw.Created||raw.created||''
  };
}

async function loadData(){
  document.getElementById('tableBody').innerHTML='<div class="spinner-row"><div class="spinner"></div></div>';
  try{
    if(!CONFIG.flowReadUrl||CONFIG.flowReadUrl.includes('PASTE_YOUR'))throw new Error('Chưa cấu hình Read URL');
    const res=await fetch(CONFIG.flowReadUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    const raw=Array.isArray(json)?json:(json.value||json.items||json.d?.results||[]);
    allData=raw.map(normalizeItem).filter(m=>m.Title);
    applyFilter();updateSidebar();
    toast(`✅ Đã tải ${allData.length} phản hồi`);
  }catch(e){showError(e.message);}
}

function showError(m){
  document.getElementById('tableBody').innerHTML=`<div class="empty"><div class="big">⚠️</div><p style="color:var(--red);font-weight:600;margin-bottom:8px">Không thể kết nối SharePoint</p><p>${m}</p></div>`;
}

function applyFilter(){
  const s=(document.getElementById('fSearch').value||'').toLowerCase();
  const d=document.getElementById('fDept').value;
  const c=document.getElementById('fColor').value;
  filtered=allData.filter(i=>{
    const matchS=!s||((i.Title+i.EmployeeRole).toLowerCase().includes(s));
    const matchD=!d||i.Department===d;
    const matchC=!c||i.PrimaryColor===c;
    return matchS&&matchD&&matchC;
  });
  renderTable();
  document.getElementById('tableTitle').textContent=filtered.length===allData.length?`Tất cả phản hồi (${allData.length})`:`Lọc: ${filtered.length} / ${allData.length}`;
}

function renderTable(){
  if(!filtered.length){document.getElementById('tableBody').innerHTML='<div class="empty"><div class="big">📭</div><p>Không có dữ liệu phù hợp</p></div>';return;}
  let html=`<table class="tbl"><thead><tr><th>Nhân Viên</th><th>Phòng Ban</th><th>Màu Chính</th><th>Màu Phụ</th><th>Phân Bổ</th><th>Archetype</th><th>Ngày</th></tr></thead><tbody>`;
  filtered.forEach(item=>{
    const p=CI[item.PrimaryColor]||CI.blue,s=CI[item.SecondaryColor]||CI.green;
    const r=item.RedScore,y=item.YellowScore,g=item.GreenScore,b=item.BlueScore;
    const date=item.Created?new Date(item.Created).toLocaleDateString('vi-VN'):'–';
    html+=`<tr onclick="openModal(${JSON.stringify(item.ID||'').replace(/"/g,'&quot;')})">
      <td><div class="name-cell"><span class="nm">${item.Title}</span><span class="rl">${item.EmployeeRole||''}</span></div></td>
      <td style="color:var(--muted);font-size:13px">${item.Department||'–'}</td>
      <td><span class="pill" style="background:${p.c}22;color:${p.c}">${p.e} ${p.l}</span></td>
      <td><span class="pill" style="background:${s.c}18;color:${s.c}">${s.e} ${s.l}</span></td>
      <td><div class="score-mini">
        <div class="score-seg" style="background:var(--red);opacity:${Math.max(.2,r/28)}" title="Red:${r}"></div>
        <div class="score-seg" style="background:var(--yellow);opacity:${Math.max(.2,y/28)}" title="Yellow:${y}"></div>
        <div class="score-seg" style="background:var(--green);opacity:${Math.max(.2,g/28)}" title="Green:${g}"></div>
        <div class="score-seg" style="background:var(--blue);opacity:${Math.max(.2,b/28)}" title="Blue:${b}"></div>
      </div></td>
      <td style="font-size:12px;color:var(--muted)">${item.Archetype||'–'}</td>
      <td style="color:var(--muted);font-size:12px">${date}</td>
    </tr>`;
  });
  document.getElementById('tableBody').innerHTML=html+'</tbody></table>';
}

function updateSidebar(){
  const total=allData.length;
  document.getElementById('statTotal').textContent=total;
  const depts=new Set(allData.map(i=>i.Department).filter(Boolean));
  document.getElementById('statDepts').textContent=depts.size;

  allData.forEach(i=>{if(counts[i.PrimaryColor]!==undefined)counts[i.PrimaryColor]++;});

  document.getElementById('statTop').textContent=top?CI[top[0]].e:'–';
  if(total>1){const d=new Date(allData[0]?.Created),d2=new Date(allData[allData.length-1]?.Created);const days=Math.max(1,Math.round(Math.abs(d-d2)/86400000));document.getElementById('statAvgDays').textContent=(total/days).toFixed(1);}

}

function buildMiniWheel(pr,sec){
  const cx=80,cy=80,R=74,r=30;
  const SC=['#E8392A','#E8823B','#F5A623','#7DB85E','#3CB371','#2B96A0','#2B6CB0','#9B4CB0'];
  const SL=['D','M','I','IH','Su','Co','Ob','Re'];
  const PM={'red-yellow':1,'red-blue':7,'red-green':0,'yellow-red':2,'yellow-green':3,'yellow-blue':2,'green-yellow':4,'green-blue':5,'green-red':4,'blue-green':5,'blue-yellow':6,'blue-red':7};
  const hl=PM[`${pr}-${sec}`]??0;
  const toR=d=>d*Math.PI/180;const pol=(r2,d)=>[cx+r2*Math.cos(toR(d)),cy+r2*Math.sin(toR(d))];
  let svg='';
  for(let i=0;i<8;i++){
    const isHL=i===hl,s=i*45-90-22.5,e=s+45;
    const [x1,y1]=pol(r,s);const [x2,y2]=pol(R,s);const [x3,y3]=pol(R,e);const [x4,y4]=pol(r,e);
    svg+=`<path d="M${x1} ${y1}L${x2} ${y2}A${R} ${R} 0 0 1 ${x3} ${y3}L${x4} ${y4}A${r} ${r} 0 0 0 ${x1} ${y1}Z" fill="${SC[i]}" opacity="${isHL?1:.3}" stroke="${isHL?'rgba(255,255,255,.6)':'rgba(0,0,0,.2)'}" stroke-width="${isHL?2:1}"/>`;
    const [lx,ly]=pol((r+R)/2,i*45-90);
    svg+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="${isHL?7:6}" font-family="DM Sans" font-weight="${isHL?700:400}" opacity="${isHL?1:.5}">${SL[i]}</text>`;
  }
  const kc=CI[pr]||CI.blue;
  svg+=`<circle cx="${cx}" cy="${cy}" r="${r-2}" fill="var(--sur2)" stroke="rgba(255,255,255,.08)" stroke-width="1"/>`;
  svg+=`<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" fill="${kc.c}" font-size="18">●</text>`;
  return `<svg viewBox="0 0 ${cx*2} ${cy*2}" style="width:160px;height:160px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))">${svg}</svg>`;
}

// ═══════════════════════════════════════
// RECALCULATE — Tính lại điểm từ Answers
// ═══════════════════════════════════════
const DIM_MAP={
  ie: new Set([24,25,26,27,28,29,30,31]),
  lead: new Set([32,33,34,35,36,37,38,39]),
  stress: new Set([40,41,42,43,44,45,46,47])
};
const CORE_N_NEW=28;

function recalcFromAnswers(answersJson){
  let ans;
  try{ ans=JSON.parse(answersJson); }catch(e){ return null; }
  const sc={r:0,y:0,g:0,b:0};
  const ie={E:0,I:0};
  const ld={r:0,y:0,g:0,b:0};
  const st={r:0,y:0,g:0,b:0};
  for(let i=0;i<48;i++){
    const a=ans[i]||ans[String(i)];
    if(!a)continue;
    if(DIM_MAP.ie.has(i)){
      sc[a]=(sc[a]||0)+0.5;
      if(a==='r'||a==='y')ie.E++;else ie.I++;
    } else if(DIM_MAP.lead.has(i)){
      ld[a]=(ld[a]||0)+1;
    } else if(DIM_MAP.stress.has(i)){
      st[a]=(st[a]||0)+1;
    } else {
      sc[a]=(sc[a]||0)+1;
    }
  }
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const pr=sorted[0][0],sec=sorted[1][0];
  const kmap={r:'red',y:'yellow',g:'green',b:'blue'};
  const ieType=ie.E>=ie.I?'Extrovert':'Introvert';
  const ls=Object.entries(ld).sort((a,b)=>b[1]-a[1])[0]?.[0]||pr;
  const sb=Object.entries(st).sort((a,b)=>b[1]-a[1])[0]?.[0]||pr;
  return {
    primaryColor:kmap[pr], secondaryColor:kmap[sec],
    redScore:Math.round(sc.r||0), yellowScore:Math.round(sc.y||0),
    greenScore:Math.round(sc.g||0), blueScore:Math.round(sc.b||0),
    ieType, leadStyle:kmap[ls], stressBehavior:kmap[sb]
  };
}

async function recalcAll(){
  const btn=document.getElementById('btnRecalc');
  const items=allData.filter(i=>i.Answers);
  if(!items.length){ toast('⚠️ Không có item nào có Answers để tính lại',true);return; }
  if(!confirm(`Tính lại điểm cho ${items.length} người từ Answers gốc?\n\nThay đổi:\n- RedScore/YellowScore/GreenScore/BlueScore được tính lại\n- Câu IE giờ đóng góp ×0.5 vào điểm màu\n- PrimaryColor & SecondaryColor có thể thay đổi\n\nTiếp tục?`))return;
  btn.disabled=true;
  let done=0,failed=0;
  for(const item of items){
    const result=recalcFromAnswers(item.Answers);
    if(!result){failed++;continue;}
    try{
      await fetch(CONFIG.flowWriteUrl,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          updateMode:true, id:item.ID,
          redScore:result.redScore, yellowScore:result.yellowScore,
          greenScore:result.greenScore, blueScore:result.blueScore,
          primaryColor:result.primaryColor, secondaryColor:result.secondaryColor,
          ieType:result.ieType, leadStyle:result.leadStyle, stressBehavior:result.stressBehavior,
          aiProfile:''
        })
      });
      done++;
      toast(`⏳ Đang cập nhật… ${done}/${items.length}`);
    }catch(e){ failed++; }
  }
  btn.disabled=false;
  toast(failed?`✅ Xong ${done}/${items.length} (${failed} lỗi)`:`✅ Đã recalculate ${done} người thành công!`);
  setTimeout(loadData,1500);
}
